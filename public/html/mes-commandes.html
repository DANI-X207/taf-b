<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Librairie Magma — Mes Commandes</title>
<link rel="stylesheet" href="/magma-fixes.css">
<style>
body { margin:0; min-height:100vh; background:linear-gradient(135deg,#fff7ef,#f3f1f1); font-family:'Trebuchet MS',Arial,sans-serif; color:#2d2d2d; }
.mo-wrap { max-width:880px; margin:60px auto; padding:0 18px; }
.mo-back { display:inline-flex; align-items:center; gap:6px; background:#2b293a; color:#fff; text-decoration:none; padding:10px 18px; border-radius:999px; font-weight:700; font-size:.9rem; margin-bottom:18px; }
.mo-back:hover { background:#3a3850; }
.mo-card { background:#fff; border-radius:18px; padding:28px; box-shadow:0 18px 60px rgba(0,0,0,.12); }
.mo-card h1 { margin:0 0 6px; color:#2b293a; font-size:1.7rem; }
.mo-card .sub { color:#888; font-size:.9rem; margin-bottom:20px; }
.mo-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.mo-filters button { background:#f3f1ef; color:#555; border:0; padding:8px 14px; border-radius:999px; font-weight:600; font-size:.82rem; cursor:pointer; }
.mo-filters button.active { background:#ff690c; color:#fff; }
.mo-item { border:1px solid #efefef; border-radius:14px; padding:16px; margin-bottom:12px; background:#fafafa; }
.mo-row { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.mo-id { font-weight:700; color:#2b293a; font-size:1rem; }
.mo-date { color:#888; font-size:.78rem; margin-top:3px; }
.mo-total { color:#ff690c; font-weight:700; font-size:1rem; }
.mo-status { padding:4px 12px; border-radius:999px; font-size:.75rem; font-weight:700; white-space:nowrap; }
.mo-zone { color:#666; font-size:.85rem; margin-top:6px; }
.mo-empty, .mo-error { color:#888; padding:30px 14px; text-align:center; }
.mo-error { color:#b42318; }
</style>
</head>
<body>
<div class="mo-wrap">
  <a href="/" class="mo-back">← Retour à l'accueil</a>
  <div class="mo-card">
    <h1>Mes commandes</h1>
    <p class="sub">Historique complet de vos commandes passées sur Librairie Magma.</p>
    <div class="mo-filters" id="mo-filters">
      <button class="active" data-f="all">Toutes</button>
      <button data-f="En attente">En attente</button>
      <button data-f="Validée">Validées</button>
      <button data-f="Annulée">Annulées</button>
    </div>
    <div id="mo-list"><p class="mo-empty">Chargement…</p></div>
  </div>
</div>
<script>
(function() {
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function money(v){return Number(v||0).toLocaleString("fr-FR")+" FCFA";}
  function fmtDate(s){if(!s)return"—";var d=new Date(s.indexOf("T")!==-1?s:s+"Z");return isNaN(d)?s:d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}
  var STATUS_BG={"En attente":"#fef9c3","Confirmée":"#dcfce7","En livraison":"#dbeafe","Livrée":"#ede9fe","Annulée":"#fee4e2","Validée":"#d1fae5"};
  var STATUS_FG={"En attente":"#854d0e","Confirmée":"#166534","En livraison":"#1e40af","Livrée":"#5b21b6","Annulée":"#b42318","Validée":"#065f46"};
  var allOrders=[]; var currentFilter="all";
  function render(){
    var list=document.getElementById("mo-list");
    var filtered=currentFilter==="all"?allOrders:allOrders.filter(function(o){return (o.status||"")===currentFilter || (currentFilter==="Validée" && (o.status==="Confirmée"||o.status==="Livrée"||o.status==="Validée"));});
    if(!filtered.length){list.innerHTML='<p class="mo-empty">Aucune commande dans cette catégorie.</p>';return;}
    list.innerHTML=filtered.map(function(o){
      var bg=STATUS_BG[o.status]||"#f3f4f6"; var fg=STATUS_FG[o.status]||"#555";
      return '<div class="mo-item">'+
        '<div class="mo-row">'+
          '<div><div class="mo-id">Commande #'+esc(o.id)+'</div><div class="mo-date">'+esc(fmtDate(o.created_at))+'</div></div>'+
          '<span class="mo-status" style="background:'+bg+';color:'+fg+'">'+esc(o.status)+'</span>'+
        '</div>'+
        '<div class="mo-row"><div class="mo-zone">📍 '+esc(o.delivery_zone||"—")+(o.delivery_address?' — '+esc(o.delivery_address):'')+'</div><div class="mo-total">'+money(o.total)+'</div></div>'+
      '</div>';
    }).join("");
  }
  document.querySelectorAll("#mo-filters button").forEach(function(b){
    b.addEventListener("click",function(){
      document.querySelectorAll("#mo-filters button").forEach(function(x){x.classList.remove("active");});
      b.classList.add("active"); currentFilter=b.getAttribute("data-f"); render();
    });
  });
  fetch("/api/my-orders").then(function(r){if(!r.ok)throw r;return r.json();}).then(function(orders){
    allOrders=orders||[]; if(!allOrders.length){document.getElementById("mo-list").innerHTML='<p class="mo-empty">Vous n\'avez pas encore passé de commande.</p>';return;}
    render();
  }).catch(function(){
    document.getElementById("mo-list").innerHTML='<p class="mo-error">Connectez-vous pour voir vos commandes. <a href="/login.html">Se connecter</a></p>';
  });
})();
</script>
</body>
</html>
