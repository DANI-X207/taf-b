<!doctype html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/img/ICON-1.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Librairie Magma — Mes Commandes</title>
<link rel="stylesheet" href="/magma-fixes.css">
<!-- skip-inject: magma-fixes.css -->
<script>window.MAGMA_HOMEPAGE_CUSTOM=true;</script>
<style>
body { margin:0; min-height:100vh; background:linear-gradient(135deg,#fff7ef,#f3f1f1); font-family:'Trebuchet MS',Arial,sans-serif; color:#2d2d2d; }

#magma-cart-badge{display:none !important}

/* === HEADER (identique à la vitrine) === */
.topbar{background:#2b293a;color:#fff;height:88px;display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;z-index:100;font-family:Verdana,Arial,Helvetica,sans-serif}
.topbar a{text-decoration:none;color:inherit}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;flex-shrink:0;text-decoration:none;color:inherit}
.logo-img{height:72px;width:auto;display:block;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(255,105,12,.35));transition:transform .2s}
.logo:hover .logo-img{transform:scale(1.05)}
.search{flex:0 1 300px;height:34px;background:#fff;border-radius:4px;display:flex;align-items:center;padding:0 12px;gap:8px}
.search input{flex:1;border:0;outline:0;font-size:13px;color:#2d2d2d;background:transparent;min-width:0}
.search button{background:#ff690c;color:#fff;border:0;height:26px;padding:0 12px;border-radius:3px;font-weight:600;cursor:pointer;font-size:12px;flex-shrink:0}
.topbar-nav{display:flex;align-items:center;gap:18px;font-size:13px}
.topbar-nav a{opacity:.85;white-space:nowrap}
.topbar-nav a:hover,.topbar-nav a.active{opacity:1;color:#ff690c}
.icons{display:flex;align-items:center;gap:14px;margin-left:auto;flex-shrink:0}
.icon-btn{color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;text-decoration:none;position:relative}
.icon-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8}
.icon-btn:hover{opacity:.85}
.cart-badge{position:absolute;top:-6px;right:-6px;background:#ff690c;color:#fff;border-radius:999px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
@media (max-width:900px){.topbar-nav{display:none}}
@media (max-width:760px){.topbar{height:auto;padding:8px 12px;flex-wrap:wrap;gap:8px;row-gap:8px}.icon-btn span{display:none}}

.mo-wrap { max-width:880px; margin:40px auto; padding:0 18px; }
.mo-back { display:inline-flex; align-items:center; gap:6px; background:#2b293a; color:#fff; text-decoration:none; padding:10px 18px; border-radius:999px; font-weight:700; font-size:.9rem; margin-bottom:18px; }
.mo-back:hover { background:#3a3850; }
.mo-card { background:#fff; border-radius:18px; padding:28px; box-shadow:0 18px 60px rgba(0,0,0,.12); }
.mo-card h1 { margin:0 0 6px; color:#2b293a; font-size:1.7rem; }
.mo-card .sub { color:#888; font-size:.9rem; margin-bottom:20px; }
.mo-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.mo-filters button { background:#f3f1ef; color:#555; border:0; padding:8px 14px; border-radius:999px; font-weight:600; font-size:.82rem; cursor:pointer; }
.mo-filters button.active { background:#ff690c; color:#fff; }
.mo-item { border:1px solid #efefef; border-radius:14px; padding:16px; margin-bottom:12px; background:#fafafa; }
.mo-row { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.mo-id { font-weight:700; color:#2b293a; font-size:1rem; }
.mo-date { color:#888; font-size:.78rem; margin-top:3px; }
.mo-total { color:#ff690c; font-weight:700; font-size:1rem; }
.mo-status { padding:4px 12px; border-radius:999px; font-size:.75rem; font-weight:700; white-space:nowrap; }
.mo-zone { color:#666; font-size:.85rem; margin-top:6px; }
.mo-empty, .mo-error { color:#888; padding:30px 14px; text-align:center; }
.mo-error { color:#b42318; }
.mo-details { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px 18px; margin:12px 0; padding:12px; background:#fff; border-radius:10px; border:1px solid #eee; }
.mo-detail { font-size:.82rem; }
.mo-detail b { display:block; color:#888; font-weight:600; font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
.mo-detail span { color:#2b293a; font-weight:600; }
.mo-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; padding-top:12px; border-top:1px solid #eee; }
.mo-btn { border:0; padding:10px 18px; border-radius:999px; font-weight:700; font-size:.85rem; cursor:pointer; transition:all .15s; }
.mo-btn-ok { background:#16a34a; color:#fff; }
.mo-btn-ok:hover { background:#15803d; }
.mo-btn-warn { background:#fff; color:#b42318; border:1.5px solid #b42318; }
.mo-btn-warn:hover { background:#fee4e2; }
.mo-btn:disabled { opacity:.55; cursor:not-allowed; }
.mo-flag { display:inline-block; margin-top:8px; font-size:.78rem; color:#b42318; font-weight:600; }
.mo-countdown { display:flex; align-items:center; gap:10px; margin-top:12px; padding:10px 14px; background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; border-radius:10px; font-size:.85rem; font-weight:600; flex-wrap:wrap; }
.mo-countdown.cd-expired { background:#f3f4f6; border-color:#e5e7eb; color:#6b7280; }
.mo-countdown svg { stroke:currentColor; }
.mo-countdown .cd-label { flex:1; min-width:200px; }
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="logo" aria-label="Librairie Magma"><img class="logo-img" src="/img/Copilot_20260402_080209.png" alt="Librairie Magma"></a>
  <form class="search" action="/catalogue.html" method="get">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" name="q" placeholder="Rechercher un article…">
    <button type="submit">Recherche</button>
  </form>
  <nav class="topbar-nav">
    <a href="/">Accueil</a>
    <a href="/catalogue.html">Mon Magma</a>
    <a href="/a-propos.html">à propos</a>
  </nav>
  <div class="icons">
    <a class="icon-btn" href="/mon-compte.html" title="Mon compte">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
      <span class="lbl">Compte</span>
    </a>
    <a class="icon-btn" href="/panier.html" title="Panier">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span class="cart-badge" id="cart-count">0</span>
      <span class="lbl">Panier</span>
    </a>
    <a class="icon-btn active" href="/mes-commandes.html" title="Mes commandes">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h6"/></svg>
      <span class="lbl">Commandes</span>
    </a>
    <a class="icon-btn" href="/parametres.html" title="Paramètres">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      <span class="lbl">Paramètres</span>
    </a>
  </div>
</header>

<div class="mo-wrap">
  <a href="/" class="mo-back">← Retour à l'accueil</a>
  <div class="mo-card">
    <h1>Mes commandes</h1>
    <p class="sub">Historique complet de vos commandes passées sur Librairie Magma.</p>
    <div class="mo-filters" id="mo-filters">
      <button class="active" data-f="all">Toutes</button>
      <button data-f="En attente">En attente</button>
      <button data-f="Validée">Validées</button>
      <button data-f="Reçue">Reçues</button>
      <button data-f="Annulée">Annulées</button>
    </div>
    <div id="mo-list"><p class="mo-empty">Chargement…</p></div>
  </div>
</div>
<script>
(function() {
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function money(v){return Number(v||0).toLocaleString("fr-FR")+" FCFA";}
  function fmtDate(s){if(!s)return"—";var d=new Date(s.indexOf("T")!==-1?s:s+"Z");return isNaN(d)?s:d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}
  var STATUS_BG={"En attente":"#fef9c3","Confirmée":"#dcfce7","En livraison":"#dbeafe","Livrée":"#ede9fe","Annulée":"#fee4e2","Validée":"#d1fae5","Reçue":"#cffafe"};
  var STATUS_FG={"En attente":"#854d0e","Confirmée":"#166534","En livraison":"#1e40af","Livrée":"#5b21b6","Annulée":"#b42318","Validée":"#065f46","Reçue":"#0e7490"};
  var allOrders=[]; var currentFilter="all";
  // Live countdown state — updated every second by tickCountdowns()
  var countdownTimer = null;
  function fmtRemaining(ms){
    if(ms<=0) return "expiré";
    var s = Math.floor(ms/1000);
    var m = Math.floor(s/60); s = s%60;
    return (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
  }
  function tickCountdowns(){
    var nodes = document.querySelectorAll("[data-cancel-until]");
    if(!nodes.length){ if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; } return; }
    var now = Date.now();
    nodes.forEach(function(node){
      var ts = node.getAttribute("data-cancel-until");
      var deadline = new Date(ts.indexOf("T")!==-1?ts:ts+"Z").getTime();
      var remaining = deadline - now;
      var label = node.querySelector(".cd-label");
      var btn = document.querySelector('button[data-act="cancel"][data-id="'+node.getAttribute("data-order-id")+'"]');
      if(remaining<=0){
        if(label) label.textContent = "Délai d'annulation expiré";
        node.classList.add("cd-expired");
        if(btn){ btn.disabled = true; btn.style.opacity = ".5"; btn.style.cursor = "not-allowed"; }
      } else {
        if(label) label.textContent = "Annulation possible pendant encore "+fmtRemaining(remaining);
      }
    });
  }
  function startCountdownTimer(){
    if(countdownTimer) return;
    countdownTimer = setInterval(tickCountdowns, 1000);
    tickCountdowns();
  }

  function render(){
    var list=document.getElementById("mo-list");
    var filtered=currentFilter==="all"?allOrders:allOrders.filter(function(o){return (o.status||"")===currentFilter || (currentFilter==="Validée" && (o.status==="Confirmée"||o.status==="Livrée"||o.status==="Validée"));});
    if(!filtered.length){list.innerHTML='<p class="mo-empty">Aucune commande dans cette catégorie.</p>';return;}
    list.innerHTML=filtered.map(function(o){
      var bg=STATUS_BG[o.status]||"#f3f4f6"; var fg=STATUS_FG[o.status]||"#555";
      var canReceipt = ["Confirmée","En livraison","Livrée","Reçue","Validée"].indexOf(o.status) !== -1;
      var flag = o.not_received_reported_at ? '<div class="mo-flag">⚠ Non-réception signalée — l\'administrateur a été notifié.</div>' : '';
      var receiptBtn = canReceipt
        ? '<a class="mo-btn mo-btn-ok" href="/api/orders/'+esc(o.id)+'/receipt.pdf" target="_blank" rel="noopener" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">📄 Télécharger le reçu (PDF)</a>'
        : '<button class="mo-btn" type="button" disabled title="Disponible dès que la commande sera confirmée par l\'administrateur" style="background:#e5e7eb;color:#9ca3af;cursor:not-allowed;">📄 Reçu PDF (en attente de confirmation)</button>';

      // Reception buttons — UNIQUEMENT lorsque l'admin a marqué la commande "Livrée"
      var receptionButtons = "";
      if(o.status === "Livrée"){
        receptionButtons =
          '<button class="mo-btn mo-btn-ok" data-act="recv" data-id="'+esc(o.id)+'">✓ Valider la réception</button>'+
          '<button class="mo-btn mo-btn-warn" data-act="not" data-id="'+esc(o.id)+'">⚠ Signaler non reçu</button>';
      } else if(["En attente","Confirmée","En livraison"].indexOf(o.status) !== -1){
        receptionButtons =
          '<button class="mo-btn" type="button" disabled title="Vous pourrez confirmer la réception une fois que l\'administrateur aura marqué la commande comme « Livrée »." style="background:#e5e7eb;color:#9ca3af;cursor:not-allowed;">✓ Valider la réception (en attente de livraison)</button>';
      }

      // Cancel block — visible while the cancel window is still open OR the order is still cancellable
      var cancelBlock = "";
      if(o.cancel_until && (o.status === "En attente" || o.status === "Confirmée")){
        var dl = new Date((o.cancel_until.indexOf("T")!==-1?o.cancel_until:o.cancel_until+"Z")).getTime();
        var remaining = dl - Date.now();
        if(remaining > 0){
          cancelBlock =
            '<div class="mo-countdown" data-order-id="'+esc(o.id)+'" data-cancel-until="'+esc(o.cancel_until)+'">'+
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+
              '<span class="cd-label">Annulation possible pendant encore '+fmtRemaining(remaining)+'</span>'+
              '<button class="mo-btn mo-btn-warn" data-act="cancel" data-id="'+esc(o.id)+'" style="margin-left:auto">Annuler la commande</button>'+
            '</div>';
        } else {
          cancelBlock =
            '<div class="mo-countdown cd-expired" data-order-id="'+esc(o.id)+'">'+
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'+
              '<span class="cd-label">Délai d\'annulation expiré</span>'+
            '</div>';
        }
      }

      var actionsInner = receiptBtn + receptionButtons;
      var actions = '<div class="mo-actions">'+ actionsInner +'</div>';

      return '<div class="mo-item" data-order="'+esc(o.id)+'">'+
        '<div class="mo-row">'+
          '<div><div class="mo-id">Commande #'+esc(o.id)+'</div><div class="mo-date">'+esc(fmtDate(o.created_at))+'</div></div>'+
          '<span class="mo-status" style="background:'+bg+';color:'+fg+'">'+esc(o.status)+'</span>'+
        '</div>'+
        '<div class="mo-details">'+
          '<div class="mo-detail"><b>Numéro</b><span>#'+esc(o.id)+'</span></div>'+
          '<div class="mo-detail"><b>Date</b><span>'+esc(fmtDate(o.created_at))+'</span></div>'+
          '<div class="mo-detail"><b>Montant</b><span>'+money(o.total)+'</span></div>'+
          '<div class="mo-detail"><b>Zone de livraison</b><span>'+esc(o.delivery_zone||"—")+'</span></div>'+
          '<div class="mo-detail"><b>Statut</b><span>'+esc(o.status)+'</span></div>'+
        '</div>'+
        cancelBlock + flag + actions +
      '</div>';
    }).join("");
    list.querySelectorAll(".mo-btn:not([disabled])").forEach(function(btn){
      if(btn.tagName==="BUTTON"){ btn.addEventListener("click", function(){ handleAction(btn); }); }
    });
    startCountdownTimer();
  }
  function handleAction(btn){
    var id = btn.getAttribute("data-id"); var act = btn.getAttribute("data-act");
    if(act==="recv"){
      if(!confirm("Confirmez-vous avoir reçu la commande #"+id+" ?")) return;
      btn.disabled=true;
      fetch("/api/orders/"+id+"/mark-received",{method:"POST",headers:{"Content-Type":"application/json"}})
        .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
        .then(function(x){ if(!x.ok) throw new Error(x.j.error||"Erreur"); reload("✓ Réception confirmée. Merci !"); })
        .catch(function(e){ alert(e.message); btn.disabled=false; });
    } else if(act==="not"){
      var reason = prompt("Décrivez brièvement le problème (commande non reçue) :","");
      if(reason===null) return;
      btn.disabled=true;
      fetch("/api/orders/"+id+"/report-not-received",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({reason:reason})})
        .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
        .then(function(x){ if(!x.ok) throw new Error(x.j.error||"Erreur"); reload("⚠ Signalement envoyé à l'administrateur."); })
        .catch(function(e){ alert(e.message); btn.disabled=false; });
    } else if(act==="cancel"){
      if(!confirm("Voulez-vous vraiment annuler la commande #"+id+" ? Cette action est irréversible.")) return;
      btn.disabled=true;
      fetch("/api/orders/"+id+"/cancel",{method:"POST",headers:{"Content-Type":"application/json"}})
        .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
        .then(function(x){ if(!x.ok) throw new Error(x.j.error||"Annulation impossible"); reload("✓ Commande annulée."); })
        .catch(function(e){ alert(e.message); btn.disabled=false; });
    }
  }
  function reload(msg){
    fetch("/api/my-orders").then(function(r){return r.json();}).then(function(orders){ allOrders=orders||[]; render(); if(msg) alert(msg); });
  }
  document.querySelectorAll("#mo-filters button").forEach(function(b){
    b.addEventListener("click",function(){
      document.querySelectorAll("#mo-filters button").forEach(function(x){x.classList.remove("active");});
      b.classList.add("active"); currentFilter=b.getAttribute("data-f"); render();
    });
  });
  fetch("/api/my-orders").then(function(r){if(!r.ok)throw r;return r.json();}).then(function(orders){
    allOrders=orders||[]; if(!allOrders.length){document.getElementById("mo-list").innerHTML='<p class="mo-empty">Vous n\'avez pas encore passé de commande.</p>';return;}
    render();
  }).catch(function(){
    document.getElementById("mo-list").innerHTML='<p class="mo-error">Connectez-vous pour voir vos commandes. <a href="/login.html">Se connecter</a></p>';
  });
})();
</script>
</body>
</html>
