<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/img/ICON-1.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Créer un compte — Librairie Magma</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100vh; background: #ffffff; }

  body {
    font-family: Verdana, Arial, Helvetica, sans-serif;
    color: #2d2d2d;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ===== TOPBAR (identique aux autres pages publiques) ===== */
  .topbar {
    background: #2b293a;
    color: #fff;
    height: 88px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: inherit;
    flex-shrink: 0;
  }
  .logo-img {
    height: 72px;
    width: auto;
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(255, 105, 12, .35));
    transition: transform .2s;
  }
  .logo:hover .logo-img { transform: scale(1.05); }

  .topbar-spacer { flex: 1; }

  .topbar a.back-link {
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    opacity: .85;
    padding: 6px 14px;
    border: 1px solid rgba(255, 255, 255, .2);
    border-radius: 999px;
    transition: opacity .15s, background .15s;
  }
  .topbar a.back-link:hover { opacity: 1; background: rgba(255, 255, 255, .08); }

  /* ===== MAIN ===== */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: #ffffff;
  }

  .register-card {
    width: 100%;
    max-width: 480px;
    background: #ffffff;
    border: 1px solid #ececec;
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, .06);
    padding: 40px 36px;
  }

  .register-card h1 {
    font-size: 26px;
    font-weight: 800;
    color: #2b293a;
    margin-bottom: 6px;
    letter-spacing: .2px;
  }

  .register-card .subtitle {
    font-size: 14px;
    color: #777;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .error-msg {
    background: #fee4e2;
    color: #b42318;
    padding: 11px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    border-left: 3px solid #b42318;
  }

  .field-group { margin-bottom: 16px; }
  .field-group label {
    display: block;
    font-size: 13px;
    color: #444;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field-group .hint {
    color: #999;
    font-size: 11.5px;
    font-weight: 400;
    margin-left: 4px;
  }
  .field-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d4d4d4;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    color: #2d2d2d;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }
  .field-group input:focus {
    border-color: #ff690c;
    box-shadow: 0 0 0 3px rgba(255, 105, 12, .12);
  }

  .btn-register {
    width: 100%;
    padding: 14px;
    background: #ff690c;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: .3px;
    transition: background .15s, transform .1s;
    margin-top: 8px;
    font-family: inherit;
  }
  .btn-register:hover { background: #e55a00; }
  .btn-register:active { transform: translateY(1px); }
  .btn-register:disabled { opacity: .6; cursor: not-allowed; }

  .legal {
    margin-top: 16px;
    font-size: 12px;
    color: #888;
    text-align: center;
    line-height: 1.5;
  }
  .legal a { color: #ff690c; text-decoration: none; font-weight: 600; }
  .legal a:hover { text-decoration: underline; }

  .switch-link {
    margin-top: 22px;
    padding-top: 22px;
    border-top: 1px solid #efefef;
    text-align: center;
    font-size: 13.5px;
    color: #555;
  }
  .switch-link a { color: #ff690c; text-decoration: none; font-weight: 700; }
  .switch-link a:hover { text-decoration: underline; }

  /* ===== FOOTER ===== */
  footer {
    background: #1f1d2c;
    color: #aaa;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    flex-shrink: 0;
  }
  footer a { color: #ff690c; text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 760px) {
    .topbar { height: auto; padding: 12px 14px; gap: 12px; }
    .logo-img { height: 56px; }
    .topbar a.back-link { font-size: 12px; padding: 5px 10px; }
    main { padding: 24px 14px; }
    .register-card { padding: 28px 22px; border-radius: 10px; box-shadow: 0 6px 18px rgba(0, 0, 0, .04); }
    .register-card h1 { font-size: 22px; }
    .register-card .subtitle { margin-bottom: 22px; font-size: 13.5px; }
    .field-group input { padding: 11px 13px; font-size: 14px; }
    .btn-register { padding: 13px; font-size: 14.5px; }
  }
  @media (max-width: 380px) {
    .register-card { padding: 22px 16px; }
    .register-card h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="logo" aria-label="Librairie Magma">
    <img class="logo-img" src="/img/Copilot_20260402_080209.png" alt="Librairie Magma">
  </a>
  <div class="topbar-spacer"></div>
  <a href="/" class="back-link">← Retour à l'accueil</a>
</header>

<main>
  <div class="register-card">
    <h1>Créer un compte</h1>
    <p class="subtitle">Rejoignez Librairie Magma pour commander, suivre vos livraisons et accéder à votre espace client.</p>

    <div id="error-container"></div>

    <form id="register-form" autocomplete="on" novalidate>
      <div class="field-group">
        <label for="reg-name">Nom complet</label>
        <input type="text" id="reg-name" name="name" autocomplete="name" placeholder="Ex : Jean Dupont" required>
      </div>
      <div class="field-group">
        <label for="reg-email">Adresse email</label>
        <input type="email" id="reg-email" name="email" autocomplete="email" placeholder="vous@exemple.com" required>
      </div>
      <div class="field-group">
        <label for="reg-phone">Numéro de téléphone <span class="hint">(format XX-XX-XXXX)</span></label>
        <input type="tel" id="reg-phone" name="phone" inputmode="numeric" autocomplete="tel" placeholder="XX-XX-XXXX" maxlength="12" required>
      </div>
      <div class="field-group">
        <label for="reg-password">Mot de passe <span class="hint">(min. 8 caractères, lettre + chiffre)</span></label>
        <input type="password" id="reg-password" name="password" autocomplete="new-password" placeholder="••••••••" required>
      </div>
      <button type="submit" id="reg-submit" class="btn-register">Créer mon compte</button>
      <p class="legal">En créant un compte, vous acceptez nos <a href="/conditions.html">conditions d'utilisation</a>.</p>
    </form>

    <div class="switch-link">
      Vous avez déjà un compte ? <a href="/login.html">Se connecter</a>
    </div>
  </div>
</main>

<footer>
  © Librairie Magma — <a href="/conditions.html">Conditions</a> · <a href="/confidentialite.html">Confidentialité</a>
</footer>

<script>
(function () {
  // Empêche bookstore.js d'injecter son propre formulaire (la page est autonome).
  window.MAGMA_REGISTER_PAGE_HAS_FORM = true;

  function showError(msg) {
    var container = document.getElementById("error-container");
    container.innerHTML = '';
    var d = document.createElement("div");
    d.className = "error-msg";
    d.textContent = msg;
    container.appendChild(d);
  }

  // Affiche ?error=... depuis une éventuelle redirection serveur.
  var params = new URLSearchParams(window.location.search);
  var serverErr = params.get("error");
  if (serverErr) showError(decodeURIComponent(serverErr));

  // Auto-format téléphone : XX-XX-XXXX (formatage progressif).
  function formatPhoneInput(rawDigits) {
    var d = String(rawDigits || "").replace(/\D+/g, "").slice(0, 9);
    if (d.length <= 2) return d;
    if (d.length <= 5) return d.slice(0, 2) + "-" + d.slice(2);
    return d.slice(0, 2) + "-" + d.slice(2, 5) + "-" + d.slice(5, 9);
  }
  var phoneInput = document.getElementById("reg-phone");
  phoneInput.addEventListener("input", function () {
    var caretAtEnd = this.selectionStart === this.value.length;
    var formatted = formatPhoneInput(this.value);
    this.value = formatted;
    if (caretAtEnd) {
      try { this.setSelectionRange(formatted.length, formatted.length); } catch (e) {}
    }
  });
  phoneInput.addEventListener("blur", function () { this.value = formatPhoneInput(this.value); });

  document.getElementById("register-form").addEventListener("submit", function (ev) {
    ev.preventDefault();
    var name = document.getElementById("reg-name").value.trim();
    var email = document.getElementById("reg-email").value.trim();
    var phone = formatPhoneInput(document.getElementById("reg-phone").value);
    document.getElementById("reg-phone").value = phone;
    var pass = document.getElementById("reg-password").value;
    if (!name || !email || !phone || !pass) { showError("Veuillez remplir tous les champs."); return; }
    if (phone.replace(/\D+/g, "").length !== 9) { showError("Le numéro doit comporter 9 chiffres (format XX-XX-XXXX)."); return; }

    var btn = document.getElementById("reg-submit");
    btn.disabled = true;
    btn.textContent = "Création…";

    fetch("/api/auth/register", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, email: email, phone: phone, password: pass })
    }).then(function (r) {
      return r.json().then(function (d) {
        if (r.status === 409) {
          window.location.href = "/login.html?info=" + encodeURIComponent("Un compte existe déjà. Connectez-vous.");
        } else if (!r.ok) {
          throw d;
        } else {
          window.location.href = "/";
        }
      });
    }).catch(function (err) {
      showError((err && err.error) || "Inscription impossible.");
      btn.disabled = false;
      btn.textContent = "Créer mon compte";
    });
  });
})();
</script>
</body>
</html>
