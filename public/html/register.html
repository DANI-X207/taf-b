<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Créer un compte — Librairie Magma</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8e8e8;
    padding: 24px 0;
  }
  .container {
    display: flex;
    width: min(900px, 96vw);
    min-height: 520px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .panel-left {
    flex: 1;
    position: relative;
    background: url('/img/vlad-ciutacu-rNvGfllb0u4-unsplash.png') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 28px 32px 32px;
    min-width: 260px;
  }
  .panel-left::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(30,40,30,.4);
    z-index: 0;
  }
  .panel-left > * { position: relative; z-index: 1; }
  .logo-wrap { width: 54px; height: 54px; margin-bottom: 28px; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .panel-left h2 { font-size: 26px; font-weight: 900; color: #fff; line-height: 1.3; }
  .panel-left p { font-size: 14px; color: rgba(255,255,255,.75); margin-top: 12px; line-height: 1.6; }

  .panel-right {
    width: 420px;
    flex-shrink: 0;
    background: #f9f9f9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 36px;
  }
  .panel-right h1 { font-size: 26px; font-weight: 700; color: #2b293a; margin-bottom: 6px; }
  .panel-right .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.5; }

  .error-msg { background: #fee4e2; color: #b42318; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
  .success-msg { background: #ecfdf3; color: #166534; border: 1px solid #abefc6; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }

  .field-group { margin-bottom: 14px; }
  .field-group label { display: block; font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
  .field-group input {
    width: 100%; padding: 10px 12px;
    border: 1px solid #ccc; border-radius: 3px;
    font-size: 14px; background: #f0f0f0; color: #333;
    outline: none; transition: border-color .2s; font-family: Arial, sans-serif;
  }
  .field-group input:focus { border-color: #ff690c; background: #fff; }
  .hint { font-size: 11px; color: #aaa; margin-top: 4px; }

  .strength { height: 4px; border-radius: 2px; margin-top: 6px; background: #eee; transition: all .3s; }
  .strength.s1 { background: #f87171; width: 25%; }
  .strength.s2 { background: #fb923c; width: 50%; }
  .strength.s3 { background: #facc15; width: 75%; }
  .strength.s4 { background: #4ade80; width: 100%; }

  .btn-register {
    width: 100%; padding: 13px;
    background: #ff690c; color: #fff;
    font-size: 15px; font-weight: 700;
    border: none; border-radius: 3px;
    cursor: pointer; transition: background .2s;
    margin-top: 6px; font-family: Arial, sans-serif;
  }
  .btn-register:hover { background: #e55a00; }
  .btn-register:disabled { background: #ccc; cursor: not-allowed; }

  .login-link { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }
  .login-link a { color: #ff690c; text-decoration: none; font-weight: 600; }
  .login-link a:hover { text-decoration: underline; }

  .required-star { color: #ff690c; }

  @media (max-width: 650px) {
    .panel-left { display: none; }
    .panel-right { width: 100%; padding: 36px 24px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="panel-left">
    <div class="logo-wrap"><img src="/img/Logo version mobile.png" alt="Logo Magma"></div>
    <h2>Rejoignez la<br>Librairie Magma</h2>
    <p>Créez votre compte pour passer des commandes, suivre vos livraisons et bien plus encore.</p>
  </div>

  <div class="panel-right">
    <h1>Créer un compte</h1>
    <p class="subtitle">Tous les champs marqués <span class="required-star">*</span> sont obligatoires.</p>

    <div id="msg-container"></div>

    <form id="register-form">
      <div class="field-group">
        <label>Nom d'utilisateur <span class="required-star">*</span></label>
        <input type="text" id="reg-name" name="name" required autocomplete="name" placeholder="Votre prénom ou pseudo">
      </div>
      <div class="field-group">
        <label>Adresse email <span class="required-star">*</span></label>
        <input type="email" id="reg-email" name="email" required autocomplete="email" placeholder="votre@email.com">
      </div>
      <div class="field-group">
        <label>Numéro de téléphone <span class="required-star">*</span></label>
        <input type="tel" id="reg-phone" name="phone" required autocomplete="tel" placeholder="Ex: +242 06 123 45 67">
        <p class="hint">Nécessaire pour récupérer votre compte en cas d'oubli de mot de passe.</p>
      </div>
      <div class="field-group">
        <label>Mot de passe <span class="required-star">*</span></label>
        <input type="password" id="reg-password" name="password" required autocomplete="new-password" placeholder="Min. 8 caractères">
        <div class="strength" id="strength-bar"></div>
        <p class="hint" id="strength-label"></p>
      </div>
      <div class="field-group">
        <label>Confirmer le mot de passe <span class="required-star">*</span></label>
        <input type="password" id="reg-confirm" name="confirm" required autocomplete="new-password" placeholder="Retapez votre mot de passe">
        <p class="hint" id="match-hint"></p>
      </div>
      <button type="submit" class="btn-register" id="reg-btn">Créer mon compte</button>
    </form>

    <p class="login-link">Déjà inscrit ? <a href="/login.html">Se connecter</a></p>
  </div>
</div>

<script>
(function () {
  var msgContainer = document.getElementById("msg-container");
  var regBtn = document.getElementById("reg-btn");
  var pwInput = document.getElementById("reg-password");
  var confirmInput = document.getElementById("reg-confirm");
  var strengthBar = document.getElementById("strength-bar");
  var strengthLabel = document.getElementById("strength-label");
  var matchHint = document.getElementById("match-hint");

  var LABELS = ["", "Très faible", "Faible", "Moyen", "Fort"];
  var COLORS = ["", "#f87171", "#fb923c", "#facc15", "#4ade80"];

  function getStrength(pw) {
    var s = 0;
    if (pw.length >= 8) s++;
    if (/[A-Za-z]/.test(pw)) s++;
    if (/\d/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return s;
  }

  pwInput.addEventListener("input", function () {
    var pw = pwInput.value;
    var s = getStrength(pw);
    strengthBar.className = "strength" + (s > 0 ? " s" + Math.min(s, 4) : "");
    strengthLabel.textContent = pw ? LABELS[Math.min(s, 4)] : "";
    strengthLabel.style.color = COLORS[Math.min(s, 4)];
    validateMatch();
  });

  confirmInput.addEventListener("input", validateMatch);

  function validateMatch() {
    var pw = pwInput.value;
    var conf = confirmInput.value;
    if (!conf) { matchHint.textContent = ""; return; }
    if (pw === conf) {
      matchHint.textContent = "✓ Les mots de passe correspondent";
      matchHint.style.color = "#166534";
    } else {
      matchHint.textContent = "✗ Les mots de passe ne correspondent pas";
      matchHint.style.color = "#b42318";
    }
  }

  function showMsg(text, type) {
    var d = document.createElement("div");
    d.className = type === "error" ? "error-msg" : "success-msg";
    d.textContent = text;
    msgContainer.innerHTML = "";
    msgContainer.appendChild(d);
  }

  document.getElementById("register-form").addEventListener("submit", function (e) {
    e.preventDefault();
    msgContainer.innerHTML = "";

    var name = document.getElementById("reg-name").value.trim();
    var email = document.getElementById("reg-email").value.trim();
    var phone = document.getElementById("reg-phone").value.trim();
    var password = pwInput.value;
    var confirm = confirmInput.value;

    if (password !== confirm) {
      showMsg("Les mots de passe ne correspondent pas.", "error");
      return;
    }
    if (password.length < 8) {
      showMsg("Le mot de passe doit contenir au moins 8 caractères.", "error");
      return;
    }
    if (!/[A-Za-z]/.test(password) || !/\d/.test(password)) {
      showMsg("Le mot de passe doit contenir au moins une lettre et un chiffre.", "error");
      return;
    }

    regBtn.disabled = true;
    regBtn.textContent = "Création du compte…";

    fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, email: email, phone: phone, password: password })
    }).then(function (r) {
      return r.json().then(function (d) {
        if (!r.ok) throw d;
        return d;
      });
    }).then(function () {
      window.location.href = "/";
    }).catch(function (e) {
      var msg = (e && e.error) || "Erreur lors de la création du compte.";
      showMsg(msg, "error");
      if (e && e.redirectTo) {
        setTimeout(function () { window.location.href = e.redirectTo; }, 2000);
      }
      regBtn.disabled = false;
      regBtn.textContent = "Créer mon compte";
    });
  });
})();
</script>
</body>
</html>
