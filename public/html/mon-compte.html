<!doctype html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="/img/ICON-1.png">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Librairie Magma — Mon Compte</title>
<link rel="stylesheet" href="/magma-fixes.css">
<!-- skip-inject: magma-fixes.css -->
<script>window.MAGMA_HOMEPAGE_CUSTOM=true;</script>
<style>
body { margin:0; min-height:100vh; background:linear-gradient(135deg,#fff7ef,#f3f1f1); font-family:'Trebuchet MS',Arial,sans-serif; color:#2d2d2d; }

#magma-cart-badge,#magma-admin-link{display:none !important}

/* === HEADER (identique à la vitrine) === */
.topbar{background:#2b293a;color:#fff;height:72px;display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;z-index:100;font-family:Verdana,Arial,Helvetica,sans-serif}
.topbar a{text-decoration:none;color:inherit}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;flex-shrink:0;text-decoration:none;color:inherit}
.logo-img{height:56px;width:auto;display:block;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(255,105,12,.35));transition:transform .2s}
.logo:hover .logo-img{transform:scale(1.05)}
.topbar-nav{display:flex;align-items:center;gap:18px;font-size:13px;margin-left:32px}
.topbar-nav a{opacity:.85;white-space:nowrap}
.topbar-nav a:hover,.topbar-nav a.active{opacity:1;color:#ff690c}
.icons{display:flex;align-items:center;gap:14px;margin-left:auto;flex-shrink:0}
.icon-btn{color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;text-decoration:none;position:relative}
.icon-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.8}
.icon-btn:hover{opacity:.85}
.cart-badge{position:absolute;top:-6px;right:-6px;background:#ff690c;color:#fff;border-radius:999px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
@media (max-width:900px){.topbar-nav{display:none}}
@media (max-width:760px){.topbar{height:auto;padding:8px 12px;flex-wrap:wrap;gap:8px;row-gap:8px}.icon-btn span{display:none}}

.mc-wrap { max-width:780px; margin:40px auto; padding:0 18px; }
.mc-back { display:inline-flex; align-items:center; gap:6px; background:#2b293a; color:#fff; text-decoration:none; padding:10px 18px; border-radius:999px; font-weight:700; font-size:.9rem; margin-bottom:18px; }
.mc-back:hover { background:#3a3850; }
.mc-card { background:#fff; border-radius:18px; padding:32px; box-shadow:0 18px 60px rgba(0,0,0,.12); }
.mc-card h1 { margin:0 0 6px; color:#2b293a; font-size:1.8rem; }
.mc-card .sub { color:#888; font-size:.9rem; margin-bottom:24px; }
.mc-avatar { width:72px; height:72px; border-radius:50%; background:#ff690c; color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; margin-bottom:18px; }
.mc-list { list-style:none; padding:0; margin:0; }
.mc-list li { display:flex; justify-content:space-between; gap:14px; padding:14px 0; border-bottom:1px solid #eee; }
.mc-list li:last-child { border-bottom:0; }
.mc-list .lbl { color:#888; font-size:.85rem; }
.mc-list .val { color:#2b293a; font-weight:600; text-align:right; word-break:break-word; }
.mc-loading, .mc-error { color:#888; padding:14px; text-align:center; }
.mc-error { color:#b42318; }
.mc-logout { display:block; width:100%; margin-top:22px; padding:13px 18px; background:#b42318; color:#fff; border:none; border-radius:999px; font-weight:700; font-size:.95rem; cursor:pointer; transition:background .15s; font-family:inherit; }
.mc-logout:hover { background:#8f1a13; }
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="logo" aria-label="Librairie Magma"><img class="logo-img" src="/img/Copilot_20260402_080209.png" alt="Librairie Magma"></a>
  <nav class="topbar-nav">
    <a href="/">Accueil</a>
    <a href="/catalogue.html">Mon Magma</a>
    <a href="/a-propos.html">à propos</a>
  </nav>
  <div class="icons">
    <a class="icon-btn active" href="/mon-compte.html" title="Mon compte">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
      <span class="lbl">Compte</span>
    </a>
    <a class="icon-btn" href="/panier.html" title="Panier">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span class="cart-badge" id="cart-count">0</span>
      <span class="lbl">Panier</span>
    </a>
    <a class="icon-btn" href="/mes-commandes.html" title="Mes commandes">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h6"/></svg>
      <span class="lbl">Commandes</span>
    </a>
    <a class="icon-btn" href="/parametres.html" title="Paramètres">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      <span class="lbl">Paramètres</span>
    </a>
  </div>
</header>

<div class="mc-wrap">
  <a href="/" class="mc-back">← Retour à l'accueil</a>
  <div class="mc-card" id="mc-card">
    <div class="mc-loading">Chargement…</div>
  </div>
</div>
<script>
(function() {
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function fmtDate(s){if(!s)return"—";var d=new Date(s.indexOf("T")!==-1?s:s+"Z");return isNaN(d)?s:d.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});}
  fetch("/api/auth/status").then(function(r){return r.json();}).then(function(data){
    var card=document.getElementById("mc-card");
    if(!data.authenticated||!data.user){card.innerHTML='<p class="mc-error">Vous n\'êtes pas connecté. <a href="/login.html">Se connecter</a></p>';return;}
    var u=data.user;
    var initial=(u.name||u.email||"?").charAt(0).toUpperCase();
    card.innerHTML='<div class="mc-avatar">'+esc(initial)+'</div>'+
      '<h1>'+esc(u.name||"Mon compte")+'</h1>'+
      '<p class="sub">Vos informations personnelles enregistrées sur Librairie Magma.</p>'+
      '<ul class="mc-list">'+
        '<li><span class="lbl">Nom complet</span><span class="val">'+esc(u.name||"—")+'</span></li>'+
        '<li><span class="lbl">Email</span><span class="val">'+esc(u.email||"—")+'</span></li>'+
        '<li><span class="lbl">Téléphone</span><span class="val">'+esc(u.phone||"—")+'</span></li>'+
        '<li><span class="lbl">Date d\'inscription</span><span class="val">'+esc(fmtDate(u.created_at))+'</span></li>'+
      '</ul>'+
      '<button type="button" class="mc-logout" id="mc-logout-btn">Se déconnecter</button>';
    var btn=document.getElementById("mc-logout-btn");
    if(btn){btn.addEventListener("click",function(){
      btn.disabled=true;btn.textContent="Déconnexion…";
      fetch("/api/auth/logout",{method:"POST",credentials:"same-origin"})
        .then(function(){
          document.cookie="magma_sid=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/";
          window.location.href="/";
        })
        .catch(function(){btn.disabled=false;btn.textContent="Se déconnecter";});
    });}
  }).catch(function(){
    document.getElementById("mc-card").innerHTML='<p class="mc-error">Impossible de charger les informations du compte.</p>';
  });
})();
</script>
</body>
</html>
